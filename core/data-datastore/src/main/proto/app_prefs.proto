syntax = "proto3";
option java_package = "com.srizan.technonextcodingassessment.datastore";
option java_multiple_files = true;

message AppsProtoPrefs {
  bool isUserLoggedIn = 1;
  string userEmail = 2;
  AppThemeConfig appThemeConfig = 3;
}


enum AppThemeConfig {
  LIGHT = 0;
  DARK = 1;
  SYSTEM = 2;
}